<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helios Finanzas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Encabezado -->
  <header>
    <h1>💰 Helios Finanzas</h1>
    <p>Planifica y optimiza tus finanzas personales</p>
  </header>

  <!-- Banner de bienvenida -->
  <section class="banner">
    <h2>¡Bienvenido a tu Panel Financiero!</h2>
    <p>Visualiza tu progreso y alcanza tus metas</p>
  </section>

  <!-- Contenido principal -->
  <main>
    <!-- Formulario simple -->
    <section class="finanzas">
      <h3>Tus Finanzas</h3>
      <label>Salario Mensual</label>
      <input type="number" value="800000" readonly>
      
      <label>Gastos Fijos</label>
      <input type="number" value="400000" readonly>
      
      <label>Meta Ahorro</label>
      <input type="number" value="100000" readonly>
      
      <button>Actualizar Datos</button>
    </section>

    <!-- Dashboard simple -->
    <section class="dashboard">
      <h3>Dashboard Financiero</h3>
      <div class="card">Disponible: $300,000</div>
      <div class="card">Tasa Ahorro: 37%</div>
      <div class="card">Meta: 8 meses</div>
      <div class="card">Rentabilidad: 4.2%</div>
    </section>
  </main>

  <!-- Pie de página -->
  <footer>
    <p>Simulador de Finanzas Personales • 2026</p>
  </footer>
</body>
</html>
